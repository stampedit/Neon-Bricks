<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STACKS - Button Test</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            touch-action: auto;
            pointer-events: auto;
        }
        
        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        
        .game-canvas {
            border: 3px solid #00ffff;
            border-radius: 12px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            pointer-events: none;
            z-index: 1;
        }
        
        .version-indicator {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #ff006e;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            z-index: 1000;
        }
        
        .mobile-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            z-index: 1000;
        }
        
        .drop-button {
            background: #00ffff;
            color: #0a0a0a;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            z-index: 9999;
        }
        
        .powerup-controls {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            z-index: 1000;
        }
        
        .powerup-button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            z-index: 9999;
        }
        
        .mobile-nav-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        
        .nav-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            z-index: 9999;
        }
        
        .home-button {
            background: #4ecdc4;
        }
        
        @media (max-width: 768px) {
            .mobile-controls {
                display: block;
            }
            
            .mobile-nav-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div class="version-indicator">BUTTON TEST VERSION</div>
    
    <div class="game-container">
        <canvas id="gameCanvas" class="game-canvas" width="500" height="700"></canvas>
        
        <div class="mobile-controls">
            <button id="dropButton" class="drop-button">DROP</button>
            
            <div id="powerUpControls" class="powerup-controls">
                <button id="powerUpButton" class="powerup-button">POWER-UP</button>
            </div>
            
            <div id="mobileNavControls" class="mobile-nav-controls">
                <button id="homeButton" class="nav-button home-button">HOME</button>
            </div>
        </div>
    </div>

    <!-- ONLY SIMPLE BUTTON FIX -->
    <script src="simple-button-fix.js"></script>
    
    <script>
        console.log('🔧 HTML: Simple button test version loaded');
    </script>
</body>
</html>
